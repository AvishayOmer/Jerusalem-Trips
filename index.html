<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>טיולי ירושלים | חוויית טיולים בישראל ברמה הגבוהה ביותר</title>

<meta name="description" content="טיולי ירושלים - סיורים בעיר העתיקה, הכותל המערבי, תל אביב, אילת, מצדה, ים המלח, חברון ומערת המכפלה. חוויה מקצועית עם הדרכה ואבטחה ברמה גבוהה.">

<meta name="keywords" content="טיולים בירושלים, העיר העתיקה, הכותל, שער יפו, תל אביב, אילת, מצדה, ים המלח, מערת המכפלה, קריית ארבע, סיורים בישראל, הדרכת טיולים">

<style>

/* ================= BASE ================= */

body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
  overflow-x:hidden;
}

section{
  padding:40px 20px;
}

/* ================= HERO ================= */

.hero img{
  width:100%;
  height:520px;
  object-fit:cover;
}

/* ================= CINEMATIC ================= */

.cinematic{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.cinematic.show{
  opacity:1;
  transform:translateY(0);
}

/* ================= BUTTONS ================= */

button{
  padding:10px 16px;
  border:none;
  cursor:pointer;
  border-radius:10px;
}

/* ================= REGION CARDS ================= */

.region-rooms{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.region{
  padding:10px 18px;
  background:rgba(255,255,255,0.12);
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}

.region:hover{
  background:#15cfe0;
  color:#000;
  transform:scale(1.05);
}

/* ================= OVERLAY ROOM SYSTEM ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  flex-direction:column;
  z-index:99999;
  animation:fadeIn 0.4s ease;
}

.overlay.open{
  display:flex;
}

.overlay-content{
  padding:30px;
  overflow-y:auto;
  max-height:100vh;
}

.close-btn{
  position:absolute;
  top:15px;
  left:15px;
  font-size:30px;
  cursor:pointer;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* ================= LIGHTBOX ================= */

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999999;
}

.lightbox img{
  max-width:90%;
  max-height:80%;
}

.lightbox.open{
  display:flex;
}

/* ================= WHATSAPP ================= */

#whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
}

#whatsapp img{
  width:100%;
}

</style>
</head>

<body>

<header class="cinematic show">
<h1>טיולי ירושלים</h1>
<p>סיורים • אבטחה • הדרכת טיולים בכל ישראל</p>
</header>

<!-- ================= HERO ================= -->
<div class="hero cinematic show">
<img id="slider" src="./images/1.webp">
</div>

<!-- ================= REGIONS ================= -->
<section class="cinematic show">

<h2>אזורים לטיולים בישראל</h2>

<div class="region-rooms">
  <div class="region" onclick="openRoom('jerusalem')">ירושלים</div>
  <div class="region" onclick="openRoom('telaviv')">תל אביב</div>
  <div class="region" onclick="openRoom('eilat')">אילת</div>
  <div class="region" onclick="openRoom('deadsea')">ים המלח</div>
  <div class="region" onclick="openRoom('hebron')">חברון ומערת המכפלה</div>
</div>

</section>

<!-- ================= OVERLAY ROOM ================= -->
<div id="overlay" class="overlay">

<div class="close-btn" onclick="closeRoom()">✖</div>

<div class="overlay-content" id="roomContent"></div>

</div>

<!-- ================= LIGHTBOX ================= -->
<div id="lightbox" class="lightbox" onclick="this.classList.remove('open')">
<img id="lightboxImg">
</div>

<!-- ================= WHATSAPP ================= -->
<div id="whatsapp">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</div>

<!-- ================= SCRIPT ================= -->
<script>

/* ================= SLIDER ================= */

let imgs=["./images/1.webp","./images/2.webp","./images/3.webp"];
let i=0;

setInterval(()=>{
  i=(i+1)%imgs.length;
  document.getElementById("slider").src=imgs[i];
},4000);

/* ================= ROOMS DATA (SEO HEAVY) ================= */

const rooms = {

jerusalem:`
<h1>ירושלים – העיר העתיקה והקדושה בעולם</h1>
<p>
ירושלים היא עיר בעלת חשיבות היסטורית, דתית ותרבותית מהגדולות בעולם. העיר העתיקה כוללת את הכותל המערבי, שער יפו, הרובע היהודי, הרובע המוסלמי והרובע הנוצרי. סיורים בעיר משלבים היסטוריה יהודית עמוקה, אתרי מורשת עולמית, שווקים צבעוניים וחוויית מסעדות כשרות ברמה גבוהה. המבקרים נהנים משילוב של מסורת, קדושה, תרבות ותצפיות מרהיבות מהר הזיתים.
</p>`,

telaviv:`
<h1>תל אביב – עיר ללא הפסקה</h1>
<p>
תל אביב היא מרכז התרבות והעסקים של ישראל. העיר מציעה טיילת יפו, נמל תל אביב, שוק הכרמל, נווה צדק וחיי לילה מהמתקדמים בעולם. סיורים בעיר משלבים קולינריה, היסטוריה מודרנית וארכיטקטורה באוהאוס ייחודית. זהו יעד חובה לכל מבקר בישראל.
</p>`,

eilat:`
<h1>אילת – חוויית ים סוף</h1>
<p>
אילת היא עיר נופש דרומית המציעה חופים מרהיבים, צלילות בים סוף, הרי אילת ושמורת תמנע. זהו יעד מושלם למשפחות וקבוצות המחפשות טבע, רוגע ואטרקציות ימיות.
</p>`,

deadsea:`
<h1>ים המלח – פלא טבע עולמי</h1>
<p>
ים המלח הוא המקום הנמוך בעולם ומציע חוויית בריאות ייחודית. הבוץ המינרלי, המים המלוחים והנוף המדברי יוצרים חוויה שאין בשום מקום אחר בעולם.
</p>`,

hebron:`
<h1>חברון ומערת המכפלה</h1>
<p>
חברון היא עיר בעלת חשיבות היסטורית עמוקה לעם היהודי. מערת המכפלה מהווה אתר קדוש ובעל משמעות דתית והיסטורית. סיורים באזור משלבים מורשת, היסטוריה ותרבות עתיקה.
</p>

`

};

/* ================= OPEN / CLOSE ROOM ================= */

function openRoom(id){
  document.getElementById("overlay").classList.add("open");
  document.getElementById("roomContent").innerHTML = rooms[id];
}

function closeRoom(){
  document.getElementById("overlay").classList.remove("open");
}

/* ================= WHATSAPP ================= */

document.getElementById("whatsapp").onclick=()=>{
  window.open("https://wa.me/972503251251");
};

/* ================= CINEMATIC SCROLL ================= */

const els=document.querySelectorAll(".cinematic");

window.addEventListener("scroll",()=>{
  els.forEach(e=>{
    if(e.getBoundingClientRect().top<window.innerHeight-100){
      e.classList.add("show");
    }
  });
});

</script>

</body>
</html>
